name: CI/CD – Build & Deploy to Azure VM

on:
  push:
    tags:
      - "v*.*.*"  # Trigger khi push tag như v1.0.0, v2.3.1, ...

env:
  IMAGE_NAME: ghcr.io/lthoa462/caro-8bit/server

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build React frontend + Docker image server, push lên ghcr.io
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: 🏗️ Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Cần để push lên ghcr.io

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── Build React Client ──────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install client dependencies
        working-directory: client
        run: npm ci

      - name: 🔨 Build React app
        working-directory: client
        run: npm run build
        env:
          # Vite environment variables (thêm nếu cần)
          # VITE_API_URL: ""  # Để trống vì dùng relative URL qua Nginx

      - name: 📤 Upload React dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 1

      # ── Build & Push Docker image ───────────────────────────────────────────
      - name: 🐳 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers giữa các lần build để tăng tốc
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy lên Azure VM qua SSH
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production  # Có thể thêm required reviewers trong GitHub Settings

    steps:
      - name: 📥 Checkout code (lấy docker-compose.yml và nginx.conf)
        uses: actions/checkout@v4

      - name: 📥 Download React dist artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist/

      - name: 🔑 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AZURE_VM_SSH_KEY }}

      - name: 🛡️ Add VM to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.AZURE_VM_HOST }} >> ~/.ssh/known_hosts

      # ── Copy files lên VM ────────────────────────────────────────────────────
      - name: 📁 Create deployment directory on VM
        run: |
          ssh ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} \
            "mkdir -p ~/app/client_dist ~/app/docker"

      - name: 📤 Upload React dist to VM
        run: |
          rsync -az --delete \
            client/dist/ \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}:~/app/client_dist/

      - name: 📤 Upload docker-compose.yml to VM
        run: |
          scp docker-compose.yml \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}:~/app/docker-compose.yml

      - name: 📤 Upload nginx.conf to VM
        run: |
          scp docker/nginx.conf \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}:~/app/docker/nginx.conf

      # ── Deploy với docker-compose ────────────────────────────────────────────
      - name: 🐳 Pull new Docker image & restart services
        run: |
          ssh ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'ENDSSH'
            cd ~/app

            # Login vào ghcr.io
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Cập nhật image tag trong environment
            export SERVER_IMAGE="${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
            export JWT_SECRET="${{ secrets.VM_JWT_SECRET }}"

            # Pull image mới
            docker pull "$SERVER_IMAGE"

            # Khởi động lại services (zero-downtime với --no-deps)
            SERVER_IMAGE="$SERVER_IMAGE" JWT_SECRET="$JWT_SECRET" \
              docker compose up -d --remove-orphans

            # Dọn dẹp images cũ
            docker image prune -f

            echo "✅ Deploy thành công! Tag: $SERVER_IMAGE"
          ENDSSH

      - name: ✅ Verify deployment
        run: |
          sleep 10  # Chờ containers khởi động
          ssh ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} \
            "cd ~/app && docker compose ps && docker compose logs --tail=20 server"

      - name: 📢 Deployment summary
        run: |
          echo "## 🎉 Deploy thành công!" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **VM**: \`${{ secrets.AZURE_VM_HOST }}\`" >> $GITHUB_STEP_SUMMARY
