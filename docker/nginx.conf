events {
    worker_processes auto;
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_vary       on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name lethanhhoa.id.vn www.lethanhhoa.id.vn;

        # Certbot webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect tất cả HTTP sang HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS main server ────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name lethanhhoa.id.vn www.lethanhhoa.id.vn;

        # SSL certificates từ Let's Encrypt
        ssl_certificate     /etc/letsencrypt/live/lethanhhoa.id.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lethanhhoa.id.vn/privkey.pem;

        # SSL best practices
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        root /usr/share/nginx/html;
        index index.html;

        # ── Static React files ───────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── REST API proxy ──────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://server:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Socket.io WebSocket proxy ────────────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://server:5000;
            proxy_http_version 1.1;

            # Required for WebSocket upgrade
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Keep WebSocket connections alive
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }
    }
}
